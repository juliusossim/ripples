sonar.projectKey=ripples
sonar.projectName=Ripples
sonar.sourceEncoding=UTF-8

sonar.sources=apps,shared,ui,features,ai
sonar.tests=apps,shared,ui,features,ai
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx
sonar.javascript.lcov.reportPaths=\
  apps/api/test-output/jest/coverage/lcov.info,\
  apps/web/test-output/vitest/coverage/lcov.info,\
  shared/api-client/test-output/jest/coverage/lcov.info,\
  shared/data/test-output/vitest/coverage/lcov.info,\
  shared/types/test-output/vitest/coverage/lcov.info,\
  ui/web/test-output/vitest/coverage/lcov.info

sonar.exclusions=\
  **/dist/**,\
  **/out-tsc/**,\
  **/coverage/**,\
  **/test-output/**,\
  **/node_modules/**,\
  **/.nx/**,\
  **/.expo/**,\
  **/web-build/**,\
  **/*.tsbuildinfo,\
  **/vite.config.*.timestamp*,\
  **/vitest.config.*.timestamp*,\
  **/prisma/migrations/**,\
  **/prisma/generated/**,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*test-fixtures.ts,\
  **/*.config.ts,\
  **/*.config.mts,\
  **/*.config.cts,\
  pnpm-lock.yaml

sonar.coverage.exclusions=\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.css,\
  **/*test-fixtures.ts,\
  **/*-controls.tsx,\
  **/*-form.tsx,\
  **/*-layout.tsx,\
  **/*-page.tsx,\
  **/*-states.tsx,\
  **/*.dto.ts,\
  **/*.types.ts,\
  **/*.module.ts,\
  **/*.controller.ts,\
  **/web.tsx,\
  **/app.tsx,\
  **/app.service.ts,\
  shared/types/**,\
  **/decorators/**,\
  **/guards/**,\
  **/repositories/**,\
  **/database/**,\
  **/auth/google/**,\
  **/events/**,\
  **/feed/**,\
  **/property/**,\
  **/health/**,\
  **/main.ts,\
  **/prisma/**,\
  **/*.config.ts,\
  **/*.config.mts,\
  **/*.config.cts

sonar.cpd.exclusions=\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*test-fixtures.ts,\
  **/*.dto.ts,\
  **/prisma/**,\
  **/*.config.ts,\
  **/*.config.mts,\
  **/*.config.cts
